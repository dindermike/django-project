<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <style>
            body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
            .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            h2 { color: #333; border-bottom: 2px solid #e0e0e0; padding-bottom: 12px; }
            .field { margin-bottom: 16px; }
            .label { font-weight: bold; color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
            .value { color: #222; margin-top: 4px; }
            .message-box { background: #f9f9f9; border-left: 4px solid #4a90e2; padding: 16px; border-radius: 4px; white-space: pre-wrap; }
            .footer { margin-top: 32px; font-size: 12px; color: #aaa; text-align: center; }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>📬 New Contact Form Submission</h2>

            <div class="field">
                <div class="label">Name</div>
                <div class="value">{{ data.first_name }} {{ data.last_name }}</div>
            </div>

            <div class="field">
                <div class="label">Email</div>
                <div class="value"><a href="mailto:{{ data.email }}">{{ data.email }}</a></div>
            </div>

            <div class="field">
                <div class="label">Phone</div>
                <div class="value">{{ data.phone|default:"Not provided" }}</div>
            </div>

            <div class="field">
                <div class="label">Message</div>
                <div class="message-box">{{ data.body }}</div>
            </div>

            <div class="footer">
                This email was sent via your website contact form.
            </div>
        </div>
    </body>
</html>
