<tr>
    <td class="row2-cell" style="padding:0 32px; vertical-align:top;">
        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%"
            style="border-collapse:collapse;">
            <tr>
                <td>
                    <p class="body-text">
                        {{ body_text|safe }}
                    </p>

                    <div class="field">
                        <div class="label">Name:</div>
                        <div class="value">&emsp;{{ data.first_name }} {{ data.last_name }}</div>
                    </div>

                    <div class="field">
                        <div class="label">Email:</div>
                        <div class="value">&emsp;<a href="mailto:{{ data.email }}">{{ data.email }}</a></div>
                    </div>

                    <div class="field">
                        <div class="label">Phone:</div>
                        <div class="value">&emsp;{{ data.phone }}</div>
                    </div>

                    <div class="field">
                        <div class="label">Message:</div>
                        <div class="message-box">{{ data.message }}</div>
                    </div>
                </td>
            </tr>
        </table>
    </td>
</tr>
