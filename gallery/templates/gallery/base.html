<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Gallery{% endblock %}</title>

  {# ── messages / flash ── #}
  <style>
    .messages { list-style: none; padding: 0; margin: 1rem 0; }
    .messages li { padding: .75rem 1rem; border-radius: 4px; margin-bottom: .5rem; }
    .messages .success { background: #d1fae5; color: #065f46; }
    .messages .error   { background: #fee2e2; color: #991b1b; }
    .messages .warning { background: #fef3c7; color: #92400e; }
    .messages .info    { background: #dbeafe; color: #1e40af; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  {% block content %}{% endblock %}

  {% block extra_scripts %}{% endblock %}
</body>
</html>
